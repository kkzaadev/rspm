name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: rspm-linux-x86_64.tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }} --bin rspm --bin rspm-daemon
      - name: Package artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rspm dist/
          cp target/${{ matrix.target }}/release/rspm-daemon dist/
          cd dist
          tar -czf ../${{ matrix.asset }} rspm rspm-daemon
          cd ..
          sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: Extract CHANGELOG section for this tag
        id: changelog
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          NOTES=$(awk -v ver="$TAG" '
            BEGIN { capture=0 }
            /^## \[/ {
              if (capture) exit
              if ($0 ~ "\\[" ver "\\]") { capture=1; next }
            }
            capture { print }
          ' CHANGELOG.md || true)
          {
            echo "notes<<RSPM_EOF"
            if [ -z "$NOTES" ]; then
              echo "_(no CHANGELOG entry found for $TAG)_"
            else
              echo "$NOTES"
            fi
            echo "RSPM_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: List downloaded assets
        run: ls -la dist/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: true
          make_latest: "true"
          prerelease: false
