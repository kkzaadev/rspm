name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: rspm-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: rspm-linux-aarch64.tar.gz
            cross: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross toolchain
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat <<'EOF' > .cargo/config.toml
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
      - run: cargo build --release --target ${{ matrix.target }} --bin rspm --bin rspm-daemon
      - name: Package artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rspm dist/
          cp target/${{ matrix.target }}/release/rspm-daemon dist/
          cd dist
          tar -czf ../${{ matrix.asset }} rspm rspm-daemon
          cd ..
          sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: List downloaded assets
        run: ls -la dist/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
